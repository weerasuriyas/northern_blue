services:
  db:
    image: postgres:16-alpine
    container_name: northern_blue_db
    environment:
      POSTGRES_DB: northern_blue
      POSTGRES_USER: northern_blue
      POSTGRES_PASSWORD: northern_blue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northern_blue -d northern_blue"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
