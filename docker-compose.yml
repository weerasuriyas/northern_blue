services:
  db:
    image: mysql:latest
    container_name: northern_blue_db
    environment:
      MYSQL_DATABASE: northern_blue
      MYSQL_USER: northern_blue
      MYSQL_PASSWORD: northern_blue
      MYSQL_ROOT_PASSWORD: northern_blue
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "northern_blue", "-pnorthern_blue"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
